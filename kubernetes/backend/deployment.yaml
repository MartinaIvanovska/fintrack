apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fintrack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: martinaivanovska04/fintrack-backend:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secret