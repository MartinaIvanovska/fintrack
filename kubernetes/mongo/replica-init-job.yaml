apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-replica-init
  namespace: fintrack
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-replica-init
          image: mongo:7.0
          command:
            - bash
            - -c
            - |
              set -e
              echo "Waiting for all MongoDB pods to be ready..."
              sleep 10

              for i in 0 1 2; do
                until mongosh --host mongo-$i.mongo:27017 --eval "db.adminCommand('ping')" &>/dev/null; do
                  echo "Waiting for mongo-$i..."
                  sleep 3
                done
                echo "mongo-$i is ready"
              done

              echo "Checking if replica set already initialized..."
              STATUS=$(mongosh --host mongo-0.mongo:27017 --eval "rs.status().ok" --quiet 2>/dev/null || echo "0")

              if [ "$STATUS" = "1" ]; then
                echo "Replica set already initialized, skipping..."
                exit 0
              else
                echo "Initializing replica set..."
                mongosh --host mongo-0.mongo:27017 --eval "
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      { _id: 0, host: 'mongo-0.mongo:27017', priority: 2 },
                      { _id: 1, host: 'mongo-1.mongo:27017', priority: 1 },
                      { _id: 2, host: 'mongo-2.mongo:27017', priority: 1 }
                    ]
                  })
                "
                echo "Replica set initiated!"
              fi